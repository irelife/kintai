<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>勤怠管理 — PIVOT</title>
<style>
  /* ベース(本体から独立) */
  *{margin:0;padding:0;}
  html,body{
    background:#f2efe6;
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",system-ui,-apple-system,sans-serif;
    -webkit-text-size-adjust:100%;
  }
  body{padding:14px 10px 40px;}
  /* 独立版なので #kintai-view は常時表示 */
  #kintai-view{display:block;}
</style>
</head>
<body>

<div id="kintai-view">
  <style>
  #kintai-view{
    --kt-ink:#1f2421; --kt-paper:#f7f5ef; --kt-line:#d9d4c7;
    --kt-accent:#3f6b4c; --kt-accent-soft:#e6efe7; --kt-muted:#7c776b; --kt-warn:#a14a3a;
    max-width:760px; margin:0 auto; padding:20px 20px 60px;
    color:var(--kt-ink); line-height:1.6;
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",system-ui,sans-serif;
  }
  #kintai-view *{box-sizing:border-box;}
  #kintai-view h1{font-size:1.3rem;font-weight:700;letter-spacing:.04em;margin:0 0 2px;}
  #kintai-view h1#kt-title{cursor:pointer;user-select:none;display:inline-block;transition:opacity .15s;}
  #kintai-view h1#kt-title:active{opacity:.5;}
  #kintai-view h1#kt-title.kt-title-sync{opacity:.4;}
  #kintai-view .kt-sub{color:var(--kt-muted);font-size:.8rem;margin-bottom:20px;}
  #kintai-view .kt-save-status{
    display:inline-block;margin-left:10px;padding:2px 10px;border-radius:999px;
    font-size:.72rem;font-weight:700;background:var(--kt-accent-soft);color:var(--kt-accent);
    transition:background .2s,color .2s,opacity .3s;vertical-align:middle;
  }
  #kintai-view .kt-save-status[data-state="saving"]{background:#fff3e0;color:#a14a3a;}
  #kintai-view .kt-save-status[data-state="saved"]{background:var(--kt-accent);color:#fff;}
  #kintai-view .kt-clock{
    background:#fff;border:1px solid var(--kt-line);border-radius:14px;
    padding:22px;text-align:center;margin-bottom:18px;
  }
  #kintai-view .kt-now-date{font-size:.9rem;color:var(--kt-muted);}
  #kintai-view .kt-now-time{font-size:2.6rem;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:.02em;}
  #kintai-view .kt-btns{display:flex;gap:12px;margin-top:16px;}
  #kintai-view .kt-btns button{
    flex:1;padding:16px;border:none;border-radius:11px;font-size:1.05rem;
    font-weight:700;cursor:pointer;transition:transform .05s, opacity .2s;font-family:inherit;
  }
  #kintai-view .kt-btns button:active{transform:scale(.97);}
  #kintai-view .kt-btn-in{background:var(--kt-accent);color:#fff;}
  #kintai-view .kt-btn-out{background:#fff;color:var(--kt-accent);border:1.5px solid var(--kt-accent);}
  #kintai-view .kt-btns button:disabled{opacity:.38;cursor:not-allowed;}
  #kintai-view .kt-today-status{margin-top:12px;font-size:.85rem;color:var(--kt-muted);}
  #kintai-view .kt-bar{display:flex;align-items:center;gap:10px;margin:18px 0 10px;}
  #kintai-view .kt-bar h2{font-size:1rem;font-weight:700;}
  #kintai-view .kt-bar select,#kintai-view .kt-bar button{
    font-family:inherit;font-size:.85rem;padding:7px 10px;
    border:1px solid var(--kt-line);border-radius:8px;background:#fff;color:var(--kt-ink);cursor:pointer;
  }
  #kintai-view .kt-bar .kt-spacer{flex:1;}
  #kintai-view .kt-btn-csv{background:var(--kt-accent-soft);border-color:var(--kt-accent);color:var(--kt-accent);font-weight:700;}
  #kintai-view table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--kt-line);border-radius:12px;overflow:hidden;font-size:.85rem;}
  #kintai-view th,#kintai-view td{padding:9px 8px;text-align:center;border-bottom:1px solid var(--kt-line);}
  #kintai-view th{background:#efece3;font-weight:700;font-size:.78rem;color:var(--kt-muted);}
  #kintai-view td input[type=time]{font-family:inherit;font-size:.85rem;border:1px solid transparent;background:transparent;border-radius:5px;padding:3px;width:78px;text-align:center;}
  #kintai-view td input[type=time]:hover{border-color:var(--kt-line);}
  #kintai-view td input[type=time]:focus{border-color:var(--kt-accent);outline:none;background:#fff;}
  #kintai-view tr.kt-sat td:first-child{color:#3a6ea1;}
  #kintai-view tr.kt-sun td:first-child{color:var(--kt-warn);}
  #kintai-view .kt-work{font-variant-numeric:tabular-nums;}
  #kintai-view tfoot td{background:#efece3;font-weight:700;}
  #kintai-view .kt-note{color:var(--kt-muted);font-size:.74rem;margin-top:12px;line-height:1.5;}
  /* ===== 同期UI ===== */
  #kintai-view .kt-sync{
    background:#fff;border:1px solid var(--kt-line);border-radius:12px;
    padding:14px 16px;margin-bottom:18px;
  }
  #kintai-view .kt-sync summary{
    cursor:pointer;font-size:.9rem;font-weight:700;color:var(--kt-accent);
    list-style:none;display:flex;align-items:center;gap:8px;
  }
  #kintai-view .kt-sync summary::-webkit-details-marker{display:none;}
  #kintai-view .kt-sync .kt-sync-state{
    font-size:.72rem;font-weight:700;padding:2px 10px;border-radius:999px;
    background:var(--kt-accent-soft);color:var(--kt-accent);margin-left:auto;
  }
  #kintai-view .kt-sync .kt-sync-state[data-s="syncing"]{background:#fff3e0;color:#a14a3a;}
  #kintai-view .kt-sync .kt-sync-state[data-s="ok"]{background:var(--kt-accent);color:#fff;}
  #kintai-view .kt-sync .kt-sync-state[data-s="err"]{background:#fdecec;color:#d32f2f;}
  #kintai-view .kt-sync-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
  #kintai-view .kt-sync input[type=url]{
    flex:1;min-width:200px;font-family:inherit;font-size:.82rem;padding:8px 10px;
    border:1px solid var(--kt-line);border-radius:8px;background:#fff;color:var(--kt-ink);
  }
  #kintai-view .kt-sync button{
    font-family:inherit;font-size:.82rem;font-weight:700;padding:8px 14px;
    border:1px solid var(--kt-accent);border-radius:8px;background:var(--kt-accent-soft);
    color:var(--kt-accent);cursor:pointer;white-space:nowrap;
  }
  #kintai-view .kt-sync button:active{transform:scale(.97);}
  #kintai-view .kt-sync .kt-sync-hint{font-size:.72rem;color:var(--kt-muted);margin-top:8px;line-height:1.5;}
  #kintai-view .kt-del{color:var(--kt-warn);cursor:pointer;font-size:.95rem;border:none;background:none;}
  #kintai-view .kt-cell{display:flex;align-items:center;gap:6px;justify-content:center;}
  #kintai-view .kt-delone{color:#fff;background:var(--kt-warn,#e44);cursor:pointer;font-size:.75rem;line-height:1;border:none;border-radius:4px;padding:3px 6px;flex:none;font-weight:700;}
  </style>

  <h1 id="kt-title" title="タップで最新情報を取り込む">勤怠管理</h1>
  <div class="kt-sub">打刻制・出退勤のみ／月単位でCSV出力
    <span id="kt-save-status" class="kt-save-status">✓ 自動保存されます</span>
  </div>

  <details class="kt-sync" id="kt-sync">
    <summary>☁️ 同期設定（スマホとPCで共有）<span class="kt-sync-state" id="kt-syncState" data-s="">未設定</span></summary>
    <div class="kt-sync-row">
      <input type="url" id="kt-syncUrl" placeholder="同期サーバーのURLを貼り付け（https://script.google.com/…/exec）" autocomplete="off" spellcheck="false">
      <button id="kt-syncSave">保存</button>
      <button id="kt-syncNow">今すぐ同期</button>
    </div>
    <div class="kt-sync-hint">
      ※ 勤怠専用の同期サーバー（Google Apps Script）のURLを設定すると、この端末の打刻が他の端末と共有されます。<br>
      ※ URLはこの端末にのみ保存されます。打刻・削除のたびに自動で同期し、起動時にも最新を取り込みます。
    </div>
  </details>

  <div class="kt-clock">
    <div class="kt-now-date" id="kt-nowDate"></div>
    <div class="kt-now-time" id="kt-nowTime">--:--:--</div>
    <div class="kt-btns">
      <button class="kt-btn-in" id="kt-btnIn">出勤</button>
      <button class="kt-btn-out" id="kt-btnOut">退勤</button>
    </div>
    <div class="kt-today-status" id="kt-todayStatus"></div>
  </div>

  <div class="kt-bar">
    <h2>月次記録</h2>
    <div class="kt-spacer"></div>
    <select id="kt-monthSel"></select>
    <button class="kt-btn-csv" id="kt-btnCsv">CSV出力</button>
  </div>

  <div id="kt-tableWrap"></div>

  <div class="kt-note">
    ※ 出勤・退勤を押すと現在時刻が記録されます。押し忘れたときは表の時刻を直接編集できます。<br>
    ※ データはこの端末のブラウザ内に保存され、PIVOTのバックアップにも含まれます。CSVは選択中の月の全日を出力します。
  </div>

<script>
/* ===== KINTAI (勤怠管理 / namespaced) ===== */
(function(){
  // 完全独立版の保存キー(本体PIVOTとは別管理)
  const KEY = "kintai_standalone_v1";
  const PAD = n => String(n).padStart(2,"0");
  const WD = ["日","月","火","水","木","金","土"];

  const BAK = "kintai_standalone_v1_bak";   // 保険: 二重保存

  // ===== 旧キーからの一度きりのデータ移行 =====
  // 以前は本体PIVOTと共有の "pivot_kintai_v1" を使っていた。
  // 独立版の初回起動時、新キーが空で旧キーにデータがあれば引き継ぐ(打刻履歴を失わないため)。
  // 旧キーには触れない(本体PIVOT側がまだ使っている可能性があるため、消さず残す)。
  (function migrateFromLegacy(){
    try{
      const OLD_KEY = "pivot_kintai_v1";
      const OLD_BAK = "pivot_kintai_v1_bak";
      const cur = localStorage.getItem(KEY);
      const hasNew = cur && cur !== "{}" && cur !== "null";
      if(hasNew) return;  // 既に独立データがある → 移行不要
      let legacy = localStorage.getItem(OLD_KEY);
      if(!legacy || legacy === "{}" || legacy === "null"){
        legacy = localStorage.getItem(OLD_BAK);  // メインが空ならバックアップから
      }
      if(legacy && legacy !== "{}" && legacy !== "null"){
        localStorage.setItem(KEY, legacy);
        localStorage.setItem(BAK, legacy);
      }
    }catch(e){}
  })();

  // ===== トゥームストーン(削除マーカー)対応 =====
  // レコードは {in, out, _t} 形式。_t は最終更新時刻(ms)。
  // 削除した日は {__del: 時刻} を残す(キーごと消さない)。
  //   → これにより「削除した」という事実が端末間で同期され、相手側の残存データで復活しない。
  const TOMB_TTL = 60*24*60*60*1000;  // 60日経過した削除マーカーは完全消去(肥大化防止)
  function _nowMs(){ return Date.now(); }
  function _isDeleted(rec){ return !!(rec && typeof rec==='object' && rec.__del); }
  // 表示・集計用: 削除マーカーを除いた実データのみのコピーを返す
  function _visible(obj){
    const out={};
    Object.keys(obj||{}).forEach(k=>{ if(!_isDeleted(obj[k])) out[k]=obj[k]; });
    return out;
  }
  // 古い削除マーカーを掃除(TTL超過分のみ完全削除)
  function _gcTombstones(obj){
    const now=_nowMs();
    Object.keys(obj||{}).forEach(k=>{
      const r=obj[k];
      if(_isDeleted(r) && (now - (Number(r.__del)||0)) > TOMB_TTL){ delete obj[k]; }
    });
    return obj;
  }

  function _parse(s){ try{ return JSON.parse(s||"{}")||{}; }catch(e){ return {}; } }
  // 日付キーを必ず "YYYY-MM-DD" 形式に統一する。
  // 「Fri Jun 12 2026 ...」のような形式や、先頭の ' が付いたものも正規化する。
  function _normalizeKeys(obj){
    const MON={Jan:1,Feb:2,Mar:3,Apr:4,May:5,Jun:6,Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12};
    function one(k){
      let d=String(k).replace(/^'/, "").trim();
      if(/^\d{4}-\d{2}-\d{2}$/.test(d)) return d;
      // 「Fri Jun 12 2026」形式は月名を直接変換(タイムゾーンのずれを防ぐ)
      const m=d.match(/([A-Z][a-z]{2})\s+(\d{1,2})\s+(\d{4})/);
      if(m && MON[m[1]]){ return m[3]+"-"+PAD(MON[m[1]])+"-"+PAD(parseInt(m[2],10)); }
      const p=new Date(d);
      if(!isNaN(p.getTime())){ return p.getFullYear()+"-"+PAD(p.getMonth()+1)+"-"+PAD(p.getDate()); }
      return d;
    }
    const out={};
    Object.keys(obj||{}).forEach(k=>{
      const d=one(k);
      if(out[d]){
        // 同じ日付が複数形式で存在 → 時刻が新しい方(削除含む)を採用。時刻同点なら情報量。
        const cand=obj[k], cur=out[d];
        const tNew=(cand&&typeof cand==='object')?(Number(cand.__del)||Number(cand._t)||0):0;
        const tOld=(cur &&typeof cur ==='object')?(Number(cur.__del)||Number(cur._t)||0):0;
        if(tNew!==tOld){ if(tNew>tOld) out[d]=cand; }
        else {
          const sNew=Object.keys(cand||{}).filter(x=>x!=='_t'&&x!=='__del'&&cand[x]!==""&&cand[x]!=null).length;
          const sOld=Object.keys(cur ||{}).filter(x=>x!=='_t'&&x!=='__del'&&cur[x] !==""&&cur[x] !=null).length;
          if(sNew>sOld) out[d]=cand;
        }
      } else { out[d]=obj[k]; }
    });
    return out;
  }
  // 2つの勤怠オブジェクトを日付単位でマージ。
  // 各日について、_t(更新時刻)または__del(削除時刻)が新しい方を採用する。
  //   → 削除も編集も「最後に操作した方が勝つ」。これで端末間で削除が正しく伝わる。
  // 時刻が無い古いデータ同士は、従来通り情報量(in/out数)の多い方を残す(後方互換)。
  function _recTime(rec){
    if(!rec || typeof rec!=='object') return 0;
    if(rec.__del) return Number(rec.__del)||0;
    return Number(rec._t)||0;
  }
  function _recScore(rec){
    if(!rec || typeof rec!=='object') return -1;
    if(rec.__del) return 0;
    let s=0; for(const k in rec){ if(k==='_t'||k==='__del') continue; const v=rec[k]; if(v!==''&&v!=null) s++; } return s;
  }
  function mergeKintaiObj(a, b){
    a=_normalizeKeys(a||{}); b=_normalizeKeys(b||{});
    const out={};
    const keys=new Set([...Object.keys(a),...Object.keys(b)]);
    keys.forEach(day=>{
      const ra=a[day], rb=b[day];
      if(ra && !rb){ out[day]=ra; }
      else if(!ra && rb){ out[day]=rb; }
      else {
        const ta=_recTime(ra), tb=_recTime(rb);
        if(ta!==tb){ out[day] = (tb>ta) ? rb : ra; }       // 時刻が有る → 新しい方が勝つ(削除含む)
        else { out[day] = (_recScore(rb) > _recScore(ra)) ? rb : ra; }  // 時刻同点 → 情報量で(旧データ救済)
      }
    });
    return out;
  }

  // メインとバックアップを時刻優先でマージ(削除マーカーを尊重)。
  // どちらかが空でも、もう片方から自動復元する自己修復ロード。
  function load(){
    const main=_normalizeKeys(_parse(localStorage.getItem(KEY)));
    const bak =_normalizeKeys(_parse(localStorage.getItem(BAK)));
    let merged = mergeKintaiObj(main, bak);
    merged = _gcTombstones(merged);
    // メイン/バックアップを最新で揃えておく(再読み込みで消えた状態を治す)
    const js=JSON.stringify(merged);
    if(JSON.stringify(main)!==js){ try{ localStorage.setItem(KEY, js); }catch(e){} }
    if(JSON.stringify(bak)!==js){ try{ localStorage.setItem(BAK, js); }catch(e){} }
    return merged;
  }
  let _ktSaveTimer=null;
  function setSaveStatus(state){
    const el=document.getElementById("kt-save-status");
    if(!el) return;
    if(state==="saving"){ el.dataset.state="saving"; el.textContent="⏳ 保存中…"; }
    else if(state==="saved"){
      el.dataset.state="saved"; el.textContent="✅ 保存しました";
      clearTimeout(_ktSaveTimer);
      _ktSaveTimer=setTimeout(()=>{ el.dataset.state=""; el.textContent="✓ 自動保存されます"; }, 1600);
    }
  }
  function save(d){
    setSaveStatus("saving");
    const js=JSON.stringify(d);
    localStorage.setItem(KEY, js);
    localStorage.setItem(BAK, js);   // 二重保存(保険)
    // 独立版のクラウド同期(設定済みのときだけ動く)
    try{ if(typeof scheduleSync === 'function'){ scheduleSync(); } }catch(e){}
    setSaveStatus("saved");
  }

  // ============================================================
  // ===== 独立版クラウド同期(勤怠専用GAS) =====
  // ============================================================
  const SYNC_URL_KEY = "kintai_sync_url_v1";
  let _syncTimer = null;
  let _syncInFlight = false;
  let _syncPending = false;

  function getSyncUrl(){ try{ return localStorage.getItem(SYNC_URL_KEY) || ""; }catch(e){ return ""; } }
  function setSyncUrl(u){ try{ localStorage.setItem(SYNC_URL_KEY, u||""); }catch(e){} }

  function setSyncState(s, text){
    // タイトルにも取り込み中の見た目を反映
    const title=document.getElementById("kt-title");
    if(title){ title.classList.toggle("kt-title-sync", s==="syncing"); }
    const el=document.getElementById("kt-syncState");
    if(!el) return;
    el.dataset.s = s||"";
    el.textContent = text || ({syncing:"同期中…", ok:"同期済み", err:"同期エラー", "":"未設定"}[s||""] || "");
  }

  // GASウェブアプリはCORSプリフライトを避けるため text/plain で投げるのが定番。
  async function _postGas(url, bodyObj){
    const res = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(bodyObj),
      redirect: "follow"
    });
    const txt = await res.text();
    let json;
    try{ json = JSON.parse(txt); }catch(e){ throw new Error("サーバー応答が不正です"); }
    return json;
  }

  // サーバーと往復して同期: ローカルを送る前にサーバー最新とマージ → 送信 → 結果を保存。
  async function syncNow(){
    const url = getSyncUrl();
    if(!url){ return; }
    if(_syncInFlight){ _syncPending = true; return; }
    _syncInFlight = true;
    setSyncState("syncing");
    try{
      const localData = load();   // 自己修復込みの現在データ(トゥームストーン含む)
      // 1) サーバーの最新を取得
      let serverData = {};
      try{
        const r = await _postGas(url, { action:"load" });
        if(r && r.ok && r.payload){ serverData = r.payload.kintai || {}; }
      }catch(e){ /* loadに失敗してもsaveを試みる */ }
      // 2) ローカルとサーバーをマージ(時刻優先・削除尊重)
      let merged = mergeKintaiObj(localData, serverData);
      merged = _gcTombstones(merged);
      // 3) マージ結果をサーバーへ送信(サーバー側でも再マージされる)
      const sres = await _postGas(url, { action:"save", payload:{ kintai: merged } });
      if(sres && sres.ok && sres.payload && sres.payload.kintai){
        merged = sres.payload.kintai;   // サーバー確定版を採用
      }
      // 4) ローカルへ反映(saveを介さず直接書き、無限ループを防ぐ)
      const js = JSON.stringify(merged);
      localStorage.setItem(KEY, js);
      localStorage.setItem(BAK, js);
      data = merged;
      if(document.getElementById("kt-monthSel")){ buildMonths(); render(); refreshTodayStatus(); }
      setSyncState("ok");
    }catch(e){
      setSyncState("err", "同期エラー");
    }finally{
      _syncInFlight = false;
      if(_syncPending){ _syncPending = false; setTimeout(syncNow, 300); }
    }
  }

  // 打刻のたびに少し待ってまとめて同期(連打対策)
  function scheduleSync(){
    if(!getSyncUrl()) return;
    clearTimeout(_syncTimer);
    _syncTimer = setTimeout(syncNow, 800);
  }

  // 同期UIの配線
  function bindSync(){
    const inp=document.getElementById("kt-syncUrl");
    const btnSave=document.getElementById("kt-syncSave");
    const btnNow=document.getElementById("kt-syncNow");
    if(inp){ inp.value = getSyncUrl(); }
    if(getSyncUrl()){ setSyncState("ok", "設定済み"); }
    else { setSyncState("", "未設定"); }
    if(btnSave){
      btnSave.onclick=()=>{
        const u = (inp.value||"").trim();
        setSyncUrl(u);
        if(u){ setSyncState("ok","設定済み"); syncNow(); }
        else { setSyncState("","未設定"); }
      };
    }
    if(btnNow){ btnNow.onclick=()=>{ if(getSyncUrl()) syncNow(); }; }

    // タイトル「勤怠管理」タップで最新情報を取り込む
    const title=document.getElementById("kt-title");
    if(title){
      title.onclick=()=>{
        if(getSyncUrl()){
          syncNow();
        } else {
          // 未設定なら同期設定欄を開いて知らせる
          const det=document.getElementById("kt-sync");
          if(det){ det.open=true; det.scrollIntoView({behavior:"smooth", block:"center"}); }
          setSyncState("", "同期URLを設定してください");
        }
      };
    }
  }

  // ===== 打刻の更新・削除ヘルパー(必ず _t を刻む / 削除はトゥームストーン) =====
  // 1フィールド(in/out)をセット。空文字ならそのフィールドを削除。
  function setField(k, f, val){
    let rec = data[k];
    if(_isDeleted(rec) || !rec || typeof rec!=='object'){ rec = {}; }  // 削除済みを編集したら復活(新規扱い)
    if(val) rec[f]=val; else delete rec[f];
    if(!rec.in && !rec.out){ data[k] = { __del: _nowMs() }; }          // 中身ゼロ → 削除マーカー化
    else { rec._t = _nowMs(); data[k] = rec; }
  }
  // 1日分を丸ごと削除(トゥームストーンを残す)
  function delDay(k){ data[k] = { __del: _nowMs() }; }

  // data shape: { "2026-06-11": {in:"09:02", out:"18:30", _t:170...}, ... }
  let data = load();

  function todayKey(){ const d=new Date(); return `${d.getFullYear()}-${PAD(d.getMonth()+1)}-${PAD(d.getDate())}`; }
  function nowHM(){ const d=new Date(); return `${PAD(d.getHours())}:${PAD(d.getMinutes())}`; }

  function tickClock(){
    const nd=document.getElementById("kt-nowDate"), nt=document.getElementById("kt-nowTime");
    if(!nd||!nt) return;
    const d=new Date();
    nd.textContent = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${WD[d.getDay()]}）`;
    nt.textContent = `${PAD(d.getHours())}:${PAD(d.getMinutes())}:${PAD(d.getSeconds())}`;
  }

  function refreshTodayStatus(){
    const _tr = data[todayKey()]; const t = _isDeleted(_tr) ? {} : (_tr||{});
    const st=document.getElementById("kt-todayStatus");
    if(st) st.textContent = `本日：${t.in?`出勤 ${t.in}`:"出勤 未"} ／ ${t.out?`退勤 ${t.out}`:"退勤 未"}`;
    const bi=document.getElementById("kt-btnIn"), bo=document.getElementById("kt-btnOut");
    if(bi) bi.disabled = !!t.in;
    if(bo) bo.disabled = !t.in || !!t.out;
  }

  function workMinutes(inHM,outHM){
    if(!inHM||!outHM) return null;
    const [ih,im]=inHM.split(":").map(Number), [oh,om]=outHM.split(":").map(Number);
    let mins=(oh*60+om)-(ih*60+im);
    if(mins<0) mins+=24*60;
    return mins;
  }
  function fmtWork(mins){ if(mins==null) return "—"; return `${Math.floor(mins/60)}:${PAD(mins%60)}`; }

  function monthKeys(){
    const set=new Set(Object.keys(_visible(data)).map(k=>k.slice(0,7)));
    set.add(todayKey().slice(0,7));
    return [...set].sort().reverse();
  }
  function buildMonths(){
    const sel=document.getElementById("kt-monthSel"); if(!sel) return;
    const cur=sel.value;
    sel.innerHTML="";
    monthKeys().forEach(m=>{
      const o=document.createElement("option"); o.value=m;
      o.textContent=`${m.slice(0,4)}年${m.slice(5,7)}月`;
      sel.appendChild(o);
    });
    sel.value = cur && monthKeys().includes(cur) ? cur : todayKey().slice(0,7);
  }
  function daysInMonth(ym){ const [y,m]=ym.split("-").map(Number); return new Date(y,m,0).getDate(); }

  function render(){
    const sel=document.getElementById("kt-monthSel"); if(!sel) return;
    const ym=sel.value || todayKey().slice(0,7);
    const [y,m]=ym.split("-").map(Number);
    const dim=daysInMonth(ym);
    let rows="", total=0;
    for(let d=1; d<=dim; d++){
      const k=`${ym}-${PAD(d)}`;
      const wd=new Date(y,m-1,d).getDay();
      const rec=_isDeleted(data[k]) ? {} : (data[k]||{});
      const mins=workMinutes(rec.in,rec.out);
      if(mins!=null) total+=mins;
      const cls = wd===0?"kt-sun":(wd===6?"kt-sat":"");
      rows+=`<tr class="${cls}">
        <td>${m}/${d}<br><span style="font-size:.7rem">(${WD[wd]})</span></td>
        <td><div class="kt-cell"><input type="time" value="${rec.in||""}" data-k="${k}" data-f="in">${rec.in?`<button class="kt-delone" data-delf="${k}" data-delfield="in" title="出勤時刻を削除">削除</button>`:""}</div></td>
        <td><div class="kt-cell"><input type="time" value="${rec.out||""}" data-k="${k}" data-f="out">${rec.out?`<button class="kt-delone" data-delf="${k}" data-delfield="out" title="退勤時刻を削除">削除</button>`:""}</div></td>
        <td class="kt-work">${fmtWork(mins)}</td>
        <td>${(rec.in||rec.out)?`<button class="kt-del" data-del="${k}">×</button>`:""}</td>
      </tr>`;
    }
    const wrap=document.getElementById("kt-tableWrap");
    wrap.innerHTML=`<table>
      <thead><tr><th>日付</th><th>出勤</th><th>退勤</th><th>勤務</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr><td colspan="3">合計勤務時間</td><td class="kt-work">${fmtWork(total)}</td><td></td></tr></tfoot>
    </table>`;

    wrap.querySelectorAll('input[type=time]').forEach(inp=>{
      const apply=(deferRender)=>{
        const k=inp.dataset.k, f=inp.dataset.f;
        setField(k, f, inp.value);
        // 即座にrenderするとピッカー操作中のinputが作り直されて
        // iOSの「リセット」確定が取りこぼされることがある。
        // 少し遅延させ、ピッカーが閉じてから反映する。
        save(data);
        if(deferRender){
          setTimeout(()=>{ render(); refreshTodayStatus(); }, 60);
        } else {
          render(); refreshTodayStatus();
        }
      };
      // change: 通常の確定時(iOSのリセットもここで空値が飛ぶ)。
      inp.onchange=()=>apply(true);
      // input: 入力途中。空になった瞬間(リセット)もここで拾う(保険)。
      inp.oninput=()=>{ if(inp.value===""){ apply(true); } };
      // blur: ピッカーを閉じたとき、値が空ならクリアを確定(最後の保険)。
      inp.onblur=()=>{ if(inp.value===""){ apply(true); } };
    });
    wrap.querySelectorAll('[data-del]').forEach(b=>{
      b.onclick=()=>{ delDay(b.dataset.del); save(data); buildMonths(); render(); refreshTodayStatus(); };
    });
    wrap.querySelectorAll('[data-delf]').forEach(b=>{
      b.onclick=()=>{
        const k=b.dataset.delf, f=b.dataset.delfield;
        const cur=_isDeleted(data[k]) ? {} : (data[k]||{});
        setField(k, f, "");  // 指定フィールドを空に → in/out両方空なら自動でトゥームストーン化
        void cur;
        save(data); buildMonths(); render(); refreshTodayStatus();
      };
    });
  }

  function exportCsv(){
    const ym=document.getElementById("kt-monthSel").value;
    const [y,m]=ym.split("-").map(Number);
    const dim=daysInMonth(ym);
    let csv="\uFEFF日付,曜日,出勤,退勤,勤務時間\n", total=0;
    for(let d=1; d<=dim; d++){
      const k=`${ym}-${PAD(d)}`;
      const wd=new Date(y,m-1,d).getDay();
      const rec=_isDeleted(data[k]) ? {} : (data[k]||{});
      const mins=workMinutes(rec.in,rec.out);
      if(mins!=null) total+=mins;
      csv+=`${y}/${m}/${d},${WD[wd]},${rec.in||""},${rec.out||""},${fmtWork(mins)==="—"?"":fmtWork(mins)}\n`;
    }
    csv+=`合計,,,,"${fmtWork(total)}"\n`;
    const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download=`勤怠_${y}年${PAD(m)}月.csv`;
    a.click();
  }

  let _booted=false, _clockTimer=null;
  function bind(){
    const bi=document.getElementById("kt-btnIn"), bo=document.getElementById("kt-btnOut");
    if(bi) bi.onclick=()=>{ const k=todayKey(); setField(k,'in',nowHM()); save(data); buildMonths(); render(); refreshTodayStatus(); };
    if(bo) bo.onclick=()=>{ const k=todayKey(); const cur=_isDeleted(data[k])?{}:(data[k]||{}); setField(k,'in',cur.in||nowHM()); setField(k,'out',nowHM()); save(data); render(); refreshTodayStatus(); };
    const sel=document.getElementById("kt-monthSel"); if(sel) sel.onchange=render;
    const csv=document.getElementById("kt-btnCsv"); if(csv) csv.onclick=exportCsv;
  }

  // タブが開かれたとき / 初回表示時に呼ぶ
  function activate(){
    data = load(); // クラウド復元等で更新されている場合に追従
    if(!_booted){ bind(); bindSync(); _booted=true; }
    if(!_clockTimer){ _clockTimer=setInterval(tickClock,1000); }
    tickClock(); buildMonths(); render(); refreshTodayStatus();
    // 同期設定済みなら起動時にサーバーから取り込む
    try{ if(getSyncUrl()){ setTimeout(syncNow, 300); } }catch(e){}
  }

  // クラウド/バックアップ復元後に外部から呼べるよう公開
  window.KT = {
    activate,
    reload(){ data = load(); if(document.getElementById("kt-monthSel")){ buildMonths(); render(); refreshTodayStatus(); } },
    heal(){ data = load(); if(document.getElementById("kt-monthSel") && document.body.classList.contains('tab-kintai')){ buildMonths(); render(); refreshTodayStatus(); } },
    getData(){ return load(); }
  };

  // 保険: 起動直後にクラウド取込がメインキーを空で上書きしても、
  // バックアップキーから自動復元する(load内で自己修復)。複数回チェック。
  [1500, 3500, 6000].forEach(ms => setTimeout(()=>{ try{ window.KT.heal(); }catch(e){} }, ms));
})();


/* ===== 独立版ブート: タブ切り替えが無いので即座に勤怠を起動 ===== */
(function(){
  function boot(){
    try{
      if(window.KT && typeof window.KT.activate === 'function'){ window.KT.activate(); }
    }catch(e){ console.error('勤怠の起動に失敗:', e); }
  }
  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', boot);
  } else { boot(); }
})();
</script>
</body>
</html>
